# Missing courier — a merchant's shipment was waylaid en route. Player
# investigates, traces the trail to a hideout, recovers the cargo.
#
# Slots are "thin" — the LLM picks specific names/subroles per fill. Reuse of
# existing dormant historicals at the city is preferred when one fits.
id: missing_courier
city_tags: [port, trade_hub, mercantile]
weight: 10

prompt_seed: |
  A merchant in this city dispatched a courier with significant cargo
  bound for another settlement. The courier never reported back. Tracks
  on the road suggest the caravan was waylaid. The giver wants someone
  capable to find out what happened — and ideally, to bring the cargo
  back. The trail begins with the people who saw the courier last.

slots:
  - { id: giver,       kind: character, count: 1 }  # the merchant
  - { id: supporters,  kind: character, count: 2 }  # witness / gossip / dockhand who saw the courier leave
  - { id: antagonist,  kind: character, count: 1 }  # bandit leader / corrupt official
  - { id: cargo,       kind: item,      count: 1 }
  - { id: hideout,     kind: location,  count: 1 }  # antagonist's base — fresh sublocation in the city's region

steps:
  - kind: information
    description_hint: "speak with someone who saw the courier leave"
    target_slot: supporters[0]
  - kind: information
    description_hint: "press harder for the route the caravan actually took"
    target_slot: supporters[1]
  - kind: character_at_location
    description_hint: "track the antagonist to their hideout"
    target_slot: antagonist
    location_slot: hideout
  - kind: item_in_inventory
    description_hint: "recover the cargo"
    target_slot: cargo
