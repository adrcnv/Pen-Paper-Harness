# Wronged neighbor — a townsperson has been pushed around by a stronger
# local figure (a bully, a thug, a low-rank official). Quest resolves by
# either confronting the antagonist or recovering something they took.
#
# Fits anywhere — no city_tags filter.
id: wronged_neighbor
city_tags: []
weight: 8

prompt_seed: |
  A resident of this city has been wronged by someone with more power or
  muscle than they have — a bully extorting them, a thug who took something,
  a petty official making their life hell. The giver wants the player to
  step in. Resolution can be confronting the antagonist directly or
  retrieving what was taken; either ends the quest.

slots:
  - { id: giver,       kind: character, count: 1 }  # the wronged neighbor
  - { id: supporters,  kind: character, count: 1 }  # a witness who corroborates
  - { id: antagonist,  kind: character, count: 1 }  # the bully
  - { id: keepsake,    kind: item,      count: 1 }  # what the antagonist took

steps:
  - kind: information
    description_hint: "hear the witness's account"
    target_slot: supporters[0]
  - kind: item_in_inventory
    description_hint: "recover what was taken"
    target_slot: keepsake
