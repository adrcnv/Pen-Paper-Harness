  - Weald
  - Crownlands
  - Holdfast
  - Reach
  - Realm

# Given names are split by gender; the engine rolls a gender, then draws from
# the matching pool, so a drawn name implies a gender (Hilde female, Garrick
# male). Keep the two pools DISJOINT — a name in both makes gender_for
# ambiguous. Library derives a combined `given` = given_male + given_female.
