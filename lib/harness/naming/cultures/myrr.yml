# Archaic high-fantasy. Made-up phoneme cluster (apostrophes, double-vowels,
# title-as-name). Use sparingly — exoticism by reservation. Coastal /
# mercantile capitals occasionally roll this.
id: myrr
weight: 5
flavor: "archaic high-fantasy — apostrophes, vowel clusters, ceremonial roots"

# Place-name morphology — see anglish.yml for the full explanation.
# place_prefix+place_suffix ("Vael"+"en" → Vaelen) or place_prefix + a space
# place_word ("Kael Spire"); kingdoms add a kingdom_suffix.
place_prefix:
  - Vael
  - Kael
  - Mor
  - Sil
  - Zeph
  - Quel
  - Thal
  - Sor
  - Ny
  - Ael
  - Cael
