# Norse / north-Germanic. Patronymic -sson / -sdottir, harsh consonants,
# stone/sea/iron family roots. Highland kingdoms lean here.
id: nord
weight: 7
flavor: "norse-ish — patronymics, stone-and-sea family names, harsh consonants"

# Place-name morphology — see anglish.yml for the full explanation.
# place_prefix+place_suffix ("Frost"+"heim" → Frostheim) or place_prefix + a
# space place_word ("Iron Fell"); kingdoms add a kingdom_suffix.
