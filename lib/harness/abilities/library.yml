# The ability library. Static, hand-authored, deterministic. The Assigner
# picks N entries from this file by class + min_level filter; nothing here
# is LLM-generated.
#
# AUTHORING NOTES
# - Names are renamed-D&D — distinct enough to feel like Harness, recognizable
#   enough to load instantly for anyone who's played D&D.
# - Dice formulas use polyhedrals freely (d3, d4, d6, d8, d10, d12) — these
#   are computer-dice, balance is the goal, not physical-die fidelity. Mixed
#   formulas (1d6+1d4) read more chaotic than averaged equivalents (1d10);
#   used where the ability's flavor wants chaos.
# - Each ability lists which classes can pick it. Fighter entries with
#   min_level <= 3 are tagged with [fighter, commoner] so commoners draw
#   from that subset.
# - min_level gates "you must be at least this caster_level to learn this."
#   Damage scales further via damage_per_level (added each level beyond min).
# - uses_per_rest is the resource model — abilities don't return until the
#   character rests. pass_time(intent: rest|sleep) refreshes.
#
# STAT RESOLUTION
# Default = the caster's class primary_stat. An ability may LOCK to a specific
# stat with `stat: <name>` — used when the ability's nature demands it
# regardless of class (charm always CHA, stealth always DEX, divine always
# WIS). When `stat` is absent the resolver falls through to class primary,
# which is the right default for damage spells, weapon strikes, etc.
#
# SCHEMA (per entry)
#   id:                snake_case, unique
#   name:              display name
#   description:       1-2 sentences, evocative, no D&D jargon
#   classes:           array of class ids that can pick this
#   min_level:         caster level required
#   effect_kind:       damage | heal | buff | debuff | control | utility
#   damage_dice:       base dice formula at min_level (e.g. "2d6", "1d8+1d4")
#   damage_per_level:  added per caster level beyond min_level (or null)
#   range:             close (melee/touch) | near (~scene-room) | far (line of sight)
#   area:              null (single target) | blast_small | blast_large | line_short | cone | self
#   uses_per_rest:     int; replenished by pass_time(intent: rest|sleep)
#   stat:              optional LOCK; absent = use class.primary_stat
#   opposed_by:        target stat for opposed checks; absent = unopposed (use difficulty)
#   difficulty:        unopposed DC tier; absent = unopposed default "moderate"
#   tags:              array of free-text descriptors

