# Class roster. Each entry maps a class to its primary stat â€” the stat used
# for ability checks when an ability doesn't override it. Spellcasting class
# split (mageâ†’INT, sorcererâ†’CHA, clericâ†’WIS) and martial split (fighterâ†’STR,
# rogue/rangerâ†’DEX) follows D&D convention; tweaks are local.
#
# `hit_die` defines max-HP scaling: a level-N character has roughly
# `hit_die_max + avg(hit_die) Ă— (N-1) + CON_mod Ă— N` HP. Tougher classes
# (fighter d10) outlast squishier ones (mage d6) at the same level.
#
# Commoner is the default for plain NPCs â€” has no primary stat and a small
# hit die (d6, the squishy baseline). Draws from a tight subset of fighter
# abilities (those tagged `[fighter, commoner]` in library.yml).

